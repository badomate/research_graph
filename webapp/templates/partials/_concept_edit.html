<article class="card concept-card editing" id="concept-{{ concept.id }}">
  <form hx-post="/concepts/{{ concept.id }}" hx-target="#concept-{{ concept.id }}" hx-swap="outerHTML">
    <label class="field-label">Title</label>
    <input class="inp" name="corrected_title"
           value="{{ concept.corrected_title or concept.title }}" placeholder="{{ concept.title }}">

    <label class="field-label">Statement (LaTeX)</label>
    <textarea class="inp mono" name="statement_latex" rows="4">{{ concept.statement_latex }}</textarea>

    <label class="field-label">Assumptions</label>
    <textarea class="inp" name="assumptions" rows="2">{{ concept.assumptions }}</textarea>

    <label class="field-label">Conclusion</label>
    <textarea class="inp" name="conclusion" rows="2">{{ concept.conclusion }}</textarea>

    <label class="field-label">Reviewer notes</label>
    <textarea class="inp" name="reviewer_notes" rows="2">{{ concept.reviewer_notes }}</textarea>

    <div class="card-actions">
      <button class="btn btn-primary" type="submit">Save</button>
      <button class="btn" type="button"
              hx-get="/concepts/{{ concept.id }}/card" hx-target="#concept-{{ concept.id }}"
              hx-swap="outerHTML">Cancel</button>
    </div>
  </form>
</article>
