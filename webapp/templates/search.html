{% extends "base.html" %}
{% block title %}Search · paper_pipeline{% endblock %}
{% block content %}
<h1>Search</h1>
<form class="filters" method="get" action="/search">
  <input name="q" value="{{ q }}" placeholder="Search title / keywords / statement / conclusion…"
         autofocus autocomplete="off" style="flex:1">
  <button class="btn sm" type="submit">Search</button>
</form>
{% if q %}
  <p class="muted">{{ results|length }} result(s) for "{{ q }}"</p>
  <div class="rows">
    {% for c in results %}{% include "partials/_concept_row.html" %}{% endfor %}
  </div>
{% endif %}
{% endblock %}
