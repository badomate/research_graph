<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{% block title %}paper_pipeline{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body>
  <header class="nav">
    <a class="brand" href="/">paper<span>_</span>pipeline</a>
    <nav>
      <a href="/" {% if request.url.path == '/' %}class="active"{% endif %}>Papers</a>
      <a href="/review" {% if request.url.path == '/review' %}class="active"{% endif %}>
        Review{% if pending_review %}<span class="count">{{ pending_review }}</span>{% endif %}
      </a>
      <a href="/suggestions" {% if request.url.path == '/suggestions' %}class="active"{% endif %}>
        Suggestions{% if pending_suggestions %}<span class="count">{{ pending_suggestions }}</span>{% endif %}
      </a>
      <a href="/projects" {% if request.url.path.startswith('/projects') %}class="active"{% endif %}>Projects</a>
      <a href="/math" {% if request.url.path.startswith('/math') %}class="active"{% endif %}>Math</a>
      <a href="/brain" {% if request.url.path == '/brain' %}class="active"{% endif %}>Brain</a>
      <a href="/graph" {% if request.url.path == '/graph' %}class="active"{% endif %}>Graph</a>
      <a class="nav-util{% if request.url.path.startswith('/debug') %} active{% endif %}" href="/debug" title="Status &amp; maintenance">⚙</a>
    </nav>
    <form class="nav-search" action="/find" method="get" role="search">
      <input name="q" placeholder="Search papers & concepts…" value="{{ q if request.url.path == '/find' else '' }}"
             autocomplete="off" aria-label="Search papers and concepts">
    </form>
    <a class="btn btn-primary add" href="/papers/new">+ Add</a>
  </header>

  {% if flash %}
  <div class="toast toast-{{ flash.kind }}" id="toast" role="status">
    <span>{{ flash.text }}</span>
    <button type="button" class="toast-x" onclick="document.getElementById('toast').remove()" aria-label="dismiss">×</button>
  </div>
  <script>
    document.cookie = "flash=; Max-Age=0; path=/";
    setTimeout(() => { const t = document.getElementById('toast'); if (t) t.classList.add('toast-out'); }, 5000);
    setTimeout(() => { const t = document.getElementById('toast'); if (t) t.remove(); }, 5600);
  </script>
  {% endif %}

  <main class="{% block main_class %}wrap{% endblock %}">
    {% block content %}{% endblock %}
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
