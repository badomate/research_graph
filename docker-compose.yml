version: "3.9"

# ──────────────────────────────────────────────────────────────────────────────
# paper_pipeline — Docker Compose orchestration
#
# Services
# --------
#   orchestrator  Main Python scheduler (APScheduler).  Runs all five modules.
#   marker-api    Proxy that forwards PDF conversion to the Datalab Marker API.
#   graph-server  Lightweight FastAPI server that serves the dependency graph.
#
# Volumes
# -------
#   tmp_storage     Ephemeral scratch space for downloaded PDFs / Markdown files.
#                   Both orchestrator and marker-api mount it so the PDF can be
#                   written by the orchestrator and read by marker-api.
#   graph_static    Persistent volume shared between orchestrator (writer) and
#                   graph-server (reader) for the generated HTML graph.
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── 1. Main orchestrator ──────────────────────────────────────────────────
  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: orchestrator
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Make internal URLs available inside the container
      MARKER_API_URL: "http://marker-api:8080"
    volumes:
      # Scratch space — purged per-job inside the code
      - tmp_storage:/tmp/pipeline
      # Shared graph output
      - graph_static:/app/static
      # Tag registry — bind-mount from project root so it's available
      # at the path the default TagRegistry path resolution expects.
      - ./tags_registry.yaml:/tags_registry.yaml:ro
    depends_on:
      marker-api:
        condition: service_healthy
    networks:
      - pipeline_net

  # ── 2. Marker OCR API ─────────────────────────────────────────────────────
  marker-api:
    # Lightweight FastAPI proxy — forwards PDF conversion to the Datalab
    # Marker API (https://www.datalab.to) and returns the markdown.
    # POST /marker  {"filepath": "<path on the shared tmp_storage volume>"}
    build:
      context: ./marker-api
      dockerfile: Dockerfile
    container_name: marker-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Datalab API key — set DATALAB_API_KEY in .env
      DATALAB_API_KEY: "${DATALAB_API_KEY}"
      # Conversion mode: fast | balanced | accurate  (default: balanced)
      MARKER_MODE: "${MARKER_MODE:-balanced}"
    volumes:
      - tmp_storage:/tmp/pipeline
    ports:
      # Expose for local debugging; internal traffic uses Docker network
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - pipeline_net

  # ── 3. Dependency graph server ────────────────────────────────────────────
  graph-server:
    build:
      context: ./graph-server
      dockerfile: Dockerfile
    container_name: graph-server
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - graph_static:/app/static
    ports:
      - "${GRAPH_SERVER_PORT:-8000}:8000"
    networks:
      - pipeline_net

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  tmp_storage:
    driver: local
  graph_static:
    driver: local

# ── Internal network ──────────────────────────────────────────────────────────
networks:
  pipeline_net:
    driver: bridge
