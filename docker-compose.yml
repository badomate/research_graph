version: "3.9"

# ──────────────────────────────────────────────────────────────────────────────
# paper_pipeline — Docker Compose orchestration
#
# Services
# --------
#   orchestrator    Main Python scheduler (APScheduler). Runs all five modules.
#   marker-api      Proxy that forwards PDF conversion to the Datalab Marker API.
#   marker-local    Local marker-pdf runner (CPU or GPU depending on profile).
#   graph-server    Lightweight FastAPI server that serves the dependency graph.
#
# Profiles
# --------
#   marker-api               marker-api is active  — uses Datalab cloud API
#   marker-local-cpu         marker-local is active — CPU inference
#   marker-local-gpu         marker-local is active — GPU inference (needs NVIDIA runtime)
#
# Usage
# -----
#   Cloud API:
#     docker compose --profile marker-api up
#
#   Local CPU:
#     docker compose --profile marker-local-cpu up
#
#   Local GPU:
#     docker compose --profile marker-local-gpu up
#
# Volumes
# -------
#   tmp_storage     Ephemeral scratch space for PDFs / Markdown.
#   graph_static    Persistent volume shared between orchestrator and graph-server.
#   marker_models   Persistent volume for downloaded model weights (local only).
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── 1. Main orchestrator ──────────────────────────────────────────────────
  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: orchestrator
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Switches between cloud proxy and local runner.
      # Override in .env: MARKER_API_URL=http://marker-local:8080
      MARKER_API_URL: "${MARKER_API_URL:-http://marker-api:8080}"
      QDRANT_URL: "http://qdrant:6333"
    depends_on:
      marker-api:
        condition: service_healthy
        required: false
      marker-local-cpu:
        condition: service_healthy
        required: false
      marker-local-gpu:
        condition: service_healthy
        required: false
      qdrant:
        condition: service_started
    volumes:
      - tmp_storage:/tmp/pipeline
      - graph_static:/app/static
      - ./tags_registry.yaml:/tags_registry.yaml:ro
      - .:/workspace
    networks:
      - pipeline_net

  # ── 2. Marker cloud proxy (default) ──────────────────────────────────────
  marker-api:
    build:
      context: ./marker-api
      dockerfile: Dockerfile
    container_name: marker-api
    profiles:
      - marker-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATALAB_API_KEY: "${DATALAB_API_KEY}"
      MARKER_MODE: "${MARKER_MODE:-balanced}"
    volumes:
      - tmp_storage:/tmp/pipeline
      - .:/workspace
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      pipeline_net:
        aliases:
          - marker-api
          - marker-local

  # ── 3. Marker local — CPU ─────────────────────────────────────────────────
  marker-local-cpu:
    build:
      context: ./marker-local
      dockerfile: Dockerfile
      args:
        TORCH_INDEX_URL: "https://download.pytorch.org/whl/cpu"
    container_name: marker-local
    profiles:
      - marker-local-cpu
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TORCH_DEVICE: "cpu"
    volumes:
      - tmp_storage:/tmp/pipeline
      - marker_models:/model_cache
      - .:/workspace 
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      pipeline_net:
        aliases:
          - marker-api
          - marker-local

  # ── 4. Marker local — GPU ─────────────────────────────────────────────────
  marker-local-gpu:
    build:
      context: ./marker-local
      dockerfile: Dockerfile
      args:
        TORCH_INDEX_URL: "https://download.pytorch.org/whl/cu121"
    container_name: marker-local
    profiles:
      - marker-local-gpu
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TORCH_DEVICE: "cuda"
    volumes:
      - tmp_storage:/tmp/pipeline
      - marker_models:/model_cache
      - .:/workspace
    ports:
      - "8080:8080"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      pipeline_net:
        aliases:
          - marker-api
          - marker-local

  # ── 5. Dependency graph server ────────────────────────────────────────────
  graph-server:
    build:
      context: ./graph-server
      dockerfile: Dockerfile
    container_name: graph-server
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - graph_static:/app/static
    ports:
      - "${GRAPH_SERVER_PORT:-8000}:8000"
    networks:
      - pipeline_net
  # ── 6. Qdrant vector database (always-on, no profile) ──────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    volumes:
      - qdrant_storage:/qdrant/storage
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    networks:
      - pipeline_net
# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  tmp_storage:
    driver: local
  graph_static:
    driver: local
  marker_models:
    driver: local
  qdrant_storage:
    driver: local
# ── Internal network ──────────────────────────────────────────────────────────
networks:
  pipeline_net:
    driver: bridge
